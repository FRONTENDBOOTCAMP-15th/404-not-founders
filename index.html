<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UT 앱 기능 소개 및 가입</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="stylesheet" href="src/theme.css" />
  </head>
  <body>
    <section class="top-section">
      <h1>UT 앱에서 더욱 다양한 기능을 만나보세요</h1>
      <div class="download-cards">
        <div class="card">
          <img src="../src/images/logo.png" alt="UT 로고" class="ut-logo" />
          <span>승객 앱 다운로드</span>
          <span class="arrow">→</span>
        </div>
        <div class="card">
          <img src="../src/images/logo.png" alt="UT 로고" class="ut-logo" />
          <span>기사 앱 다운로드</span>
          <span class="arrow">→</span>
        </div>
      </div>
    </section>
    <section class="main-section">
      <div class="left">
        <h2>UT로 운행하기</h2>
      </div>
      <div class="right">
        <form class="signup-form">
          <div class="form-header">
            <h3>기사로 가입하기</h3>
            <a href="#" class="detail-link">자세히보기</a>
          </div>
          <div class="form-row">
            <input type="text" placeholder="이름" />
            <input type="text" placeholder="성" />
          </div>
          <input type="email" placeholder="이메일" class="valid" required />
          <div class="input-error">
            <input type="password" placeholder="비밀번호" class="invalid" required />
            <span class="error-msg">비밀번호를 다시 입력해주세요.</span>
          </div>
          <input type="tel" placeholder="전화번호" />
          <input type="text" value="Seoul, Korea, Republic of (South Korea)" readonly />
          <p class="terms">가입을 선택하면 약관과 개인정보 보호정책을 확인했으며 이에 동의한 것으로 간주합니다. ...</p>
          <button type="submit" class="signup-btn">가입하기</button>
          <div class="login-link">이미 계정이 있으신가요? <a href="#">로그인</a></div>
        </form>
      </div>
    </section>
  </body>
</html>
